<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Radhana Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#145faf", secondary: "#D93A6A" },
            fontFamily: {
              main: ["Playfair Display", "serif"],
              sub: ["Poppins", "sans-serif"],
            },
            keyframes: {
              fadeInUp: {
                from: { opacity: "0", transform: "translateY(24px)" },
                to: { opacity: "1", transform: "translateY(0)" },
              },
              float: {
                "0%,100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-10px)" },
              },
            },
            animation: {
              fadeInUp: "fadeInUp .6s ease forwards",
              float: "float 4s ease-in-out infinite",
            },
          },
        },
      };
    </script>
    <style>
      .card-1 {
        animation: fadeInUp 0.5s 0.1s ease both;
      }
      .card-2 {
        animation: fadeInUp 0.5s 0.2s ease both;
      }
      .card-3 {
        animation: fadeInUp 0.5s 0.3s ease both;
      }
      .input-field {
        width: 100%;
        background: rgba(255, 255, 255, 0.08);
        border: 2px solid rgba(255, 255, 255, 0.12);
        color: #fff;
        border-radius: 12px;
        padding: 13px 16px 13px 44px;
        font-family: "Poppins", sans-serif;
        font-size: 14px;
        outline: none;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .input-field::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }
      .input-field:focus {
        border-color: #d93a6a;
        background: rgba(255, 255, 255, 0.14);
      }
      .input-field.error {
        border-color: #ef4444;
      }
      .input-field-nopad {
        padding-left: 16px;
      }
      .om-float {
        position: absolute;
        font-family: "Playfair Display", serif;
        color: rgba(255, 255, 255, 0.04);
        pointer-events: none;
      }
      .social-btn {
        background: rgba(255, 255, 255, 0.08);
        border: 1.5px solid rgba(255, 255, 255, 0.15);
        color: #fff;
        border-radius: 12px;
        padding: 11px;
        font-family: "Poppins", sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .social-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateY(-1px);
      }
      .strength-segment {
        height: 4px;
        flex: 1;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.1);
        transition: background 0.3s;
      }
    </style>
    <script src="/frontend/api.js"></script>
    <script src="/frontend/auth-pages.js"></script>
  </head>
  <body
    class="min-h-screen overflow-x-hidden"
    style="
      background: linear-gradient(
        135deg,
        #1a0a2e 0%,
        #0f1f3d 50%,
        #0a0f1e 100%
      );
    "
  >
    <div class="om-float text-[200px] top-10 right-10 animate-float">ॐ</div>
    <div
      class="om-float text-[100px] bottom-20 left-10 animate-float"
      style="animation-delay: 1s"
    >
      🪷
    </div>
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none">
      <div
        class="absolute -top-32 -right-32 w-96 h-96 rounded-full blur-3xl"
        style="background: rgba(217, 58, 106, 0.12)"
      ></div>
      <div
        class="absolute -bottom-32 -left-32 w-96 h-96 rounded-full blur-3xl"
        style="background: rgba(20, 95, 175, 0.12)"
      ></div>
    </div>

    <div
      class="min-h-screen flex items-center justify-center px-4 py-12 relative z-10"
    >
      <div class="w-full max-w-lg">
        <!-- Logo -->
        <div class="text-center mb-8 card-1">
          <a href="/" class="inline-flex flex-col items-center gap-3">
            <div
              class="w-[72px] h-[72px] bg-gradient-to-br from-secondary to-pink-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-secondary/30 animate-float"
            >
              <span class="text-white font-bold font-main text-3xl">RA</span>
            </div>
            <div>
              <h1 class="font-main text-white text-2xl font-bold">
                Radhana Art
              </h1>
              <p class="font-sub text-white/40 text-xs mt-0.5">
                Laser Engraving · Kathmandu
              </p>
            </div>
          </a>
        </div>

        <!-- Card -->
        <div
          class="card-2 rounded-2xl p-8"
          style="
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
          "
        >
          <h2
            class="font-main text-white text-2xl font-semibold text-center mb-1"
          >
            Create Your Account
          </h2>
          <p class="font-sub text-white/40 text-sm text-center mb-7">
            Join thousands of happy customers
          </p>

          <form id="registerForm" novalidate>
            <!-- Name -->
            <div class="grid grid-cols-2 gap-3 mb-4">
              <div class="relative">
                <i
                  class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-white/30 text-sm"
                ></i>
                <input
                  type="text"
                  id="regFirst"
                  placeholder="First name"
                  class="input-field"
                />
              </div>
              <div class="relative">
                <i
                  class="fas fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-white/30 text-sm"
                ></i>
                <input
                  type="text"
                  id="regLast"
                  placeholder="Last name"
                  class="input-field"
                />
              </div>
            </div>
            <p
              class="font-sub text-red-400 text-xs -mt-2 mb-3 hidden"
              id="nameErr"
            >
              Please enter your full name
            </p>

            <!-- Email -->
            <div class="relative mb-4">
              <i
                class="fas fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-white/30 text-sm"
              ></i>
              <input
                type="email"
                id="regEmail"
                placeholder="Email address"
                class="input-field"
                autocomplete="email"
              />
              <p
                class="font-sub text-red-400 text-xs mt-1.5 hidden"
                id="regEmailErr"
              >
                Please enter a valid email
              </p>
            </div>

            <!-- Phone -->
            <div class="relative mb-4">
              <i
                class="fas fa-phone absolute left-3.5 top-1/2 -translate-y-1/2 text-white/30 text-sm"
              ></i>
              <input
                type="tel"
                id="regPhone"
                placeholder="Phone (+977 98XXXXXXXX)"
                class="input-field"
              />
            </div>

            <!-- Password -->
            <div class="relative mb-2">
              <i
                class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-white/30 text-sm z-10"
              ></i>
              <input
                type="password"
                id="regPwd"
                placeholder="Create password (min 8 chars)"
                class="input-field"
                oninput="checkStrength(this.value)"
                autocomplete="new-password"
              />
              <button
                type="button"
                onclick="togglePwd('regPwd', 'regEye')"
                class="absolute right-3.5 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/70 transition z-10"
              >
                <i id="regEye" class="fas fa-eye text-sm"></i>
              </button>
            </div>
            <!-- Strength indicator -->
            <div class="flex gap-1.5 mb-1" id="strengthBars">
              <div class="strength-segment" id="seg1"></div>
              <div class="strength-segment" id="seg2"></div>
              <div class="strength-segment" id="seg3"></div>
              <div class="strength-segment" id="seg4"></div>
            </div>
            <p
              class="font-sub text-xs mb-4"
              id="strengthLabel"
              style="color: rgba(255, 255, 255, 0.3)"
            >
              Enter a password
            </p>

            <!-- Confirm Password -->
            <div class="relative mb-2">
              <i
                class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-white/30 text-sm z-10"
              ></i>
              <input
                type="password"
                id="regConfirm"
                placeholder="Confirm password"
                class="input-field"
                autocomplete="new-password"
              />
              <button
                type="button"
                onclick="togglePwd('regConfirm', 'regEye2')"
                class="absolute right-3.5 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/70 transition z-10"
              >
                <i id="regEye2" class="fas fa-eye text-sm"></i>
              </button>
            </div>
            <p
              class="font-sub text-red-400 text-xs mb-4 hidden"
              id="confirmErr"
            >
              Passwords do not match
            </p>

            <!-- Terms -->
            <label class="flex items-start gap-3 cursor-pointer mb-6">
              <input
                type="checkbox"
                id="termsCheck"
                class="w-4 h-4 mt-0.5 rounded text-secondary focus:ring-secondary"
                style="
                  background: rgba(255, 255, 255, 0.1);
                  border-color: rgba(255, 255, 255, 0.3);
                "
              />
              <span class="font-sub text-white/50 text-sm leading-relaxed">
                I agree to the
                <a
                  href="#"
                  class="text-secondary hover:text-pink-300 transition"
                  >Terms of Service</a
                >
                and
                <a
                  href="#"
                  class="text-secondary hover:text-pink-300 transition"
                  >Privacy Policy</a
                >
              </span>
            </label>

            <!-- Submit -->
            <button
              type="submit"
              id="regBtn"
              class="w-full text-white font-sub font-semibold py-3.5 rounded-xl transition-all duration-300 hover:shadow-lg hover:-translate-y-0.5 flex items-center justify-center gap-2 mb-5"
              style="background: linear-gradient(135deg, #d93a6a, #e91e8c)"
            >
              <span id="regBtnText">Create Account</span>
              <i id="regBtnIcon" class="fas fa-arrow-right text-sm"></i>
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-3 mb-5">
              <div
                class="flex-1 h-px"
                style="background: rgba(255, 255, 255, 0.1)"
              ></div>
              <span
                class="font-sub text-white/30 text-xs uppercase tracking-wider"
                >or sign up with</span
              >
              <div
                class="flex-1 h-px"
                style="background: rgba(255, 255, 255, 0.1)"
              ></div>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-6">
              <button type="button" class="social-btn">
                <img
                  src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                  class="w-4 h-4"
                />
                Google
              </button>
              <button type="button" class="social-btn">
                <i class="fab fa-facebook-f text-blue-400"></i> Facebook
              </button>
            </div>

            <p class="font-sub text-white/40 text-sm text-center">
              Already have an account?
              <a
                href="/login.html"
                class="text-primary hover:text-blue-300 font-semibold transition ml-1"
                >Sign in here</a
              >
            </p>
          </form>
        </div>

        <p class="text-center mt-5 card-3">
          <a
            href="/"
            class="font-sub text-white/25 text-xs hover:text-white/50 transition"
          >
            <i class="fas fa-arrow-left mr-1"></i> Back to Home
          </a>
        </p>
      </div>
    </div>

    <script>
      function togglePwd(id, eye) {
        const input = document.getElementById(id);
        const icon = document.getElementById(eye);
        input.type = input.type === "password" ? "text" : "password";
        icon.classList.toggle("fa-eye");
        icon.classList.toggle("fa-eye-slash");
      }

      function checkStrength(pwd) {
        const segs = ["seg1", "seg2", "seg3", "seg4"];
        const colors = ["#ef4444", "#f97316", "#eab308", "#22c55e"];
        const labels = ["Too weak", "Weak", "Good", "Strong"];
        let score = 0;
        if (pwd.length >= 8) score++;
        if (/[A-Z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd)) score++;
        if (/[^A-Za-z0-9]/.test(pwd)) score++;
        segs.forEach((id, i) => {
          document.getElementById(id).style.background =
            i < score ? colors[score - 1] : "rgba(255,255,255,.1)";
        });
        const lbl = document.getElementById("strengthLabel");
        lbl.textContent = pwd.length
          ? labels[score - 1] || "Enter a password"
          : "Enter a password";
        lbl.style.color =
          score > 0 ? colors[score - 1] : "rgba(255,255,255,.3)";
      }

      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          let valid = true;
          const first = document.getElementById("regFirst").value.trim();
          const last = document.getElementById("regLast").value.trim();
          const email = document.getElementById("regEmail").value.trim();
          const pwd = document.getElementById("regPwd").value;
          const confirm = document.getElementById("regConfirm").value;
          const terms = document.getElementById("termsCheck").checked;
          const nameErr = document.getElementById("nameErr");
          const emailErr = document.getElementById("regEmailErr");
          const confirmErr = document.getElementById("confirmErr");

          if (!first || !last) {
            nameErr.classList.remove("hidden");
            valid = false;
          } else nameErr.classList.add("hidden");

          if (!email || !/\S+@\S+\.\S+/.test(email)) {
            emailErr.classList.remove("hidden");
            valid = false;
          } else emailErr.classList.add("hidden");

          if (pwd !== confirm || !pwd) {
            confirmErr.classList.remove("hidden");
            valid = false;
          } else confirmErr.classList.add("hidden");

          if (!terms) {
            alert("Please accept the Terms of Service to continue.");
            valid = false;
          }
          if (!valid) return;

          const btn = document.getElementById("regBtn");
          const text = document.getElementById("regBtnText");
          const icon = document.getElementById("regBtnIcon");
          btn.disabled = true;
          text.textContent = "Creating account...";
          icon.className = "fas fa-spinner fa-spin text-sm";

          setTimeout(() => {
            window.location.href = "/login.html";
          }, 1500);
        });
    </script>
  </body>
</html>
